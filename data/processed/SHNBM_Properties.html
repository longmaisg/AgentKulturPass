var sc=-1,sa=true,ck={};
function fm(n){return n?'\u20AC'+n.toLocaleString('en'):'-';}
function sc2(s){var x=s.toLowerCase();if(x.indexOf('available')>=0)return'sa';if(x.indexOf('reserved')>=0||x.indexOf('sold')>=0)return'sr';if(x.indexOf('construction')>=0)return'su';return'';}
function ft(p){var f=[];if(p.pk)f.push('Parking');if(p.cl)f.push('Cellar');if(p.ev)f.push('Elevator');if(p.te)f.push('Terrace');if(p.ba)f.push('Balcony');if(p.gd)f.push('Garden');if(p.ki)f.push('Kitchen');return f.map(function(x){return'<span class="ft">'+x+'</span>';}).join(' ');}

function gf(){
  var q=document.getElementById('bSearch').value.toLowerCase();
  var ft2=document.getElementById('bType').value;
  var fs=document.getElementById('bStatus').value;
  var fe=document.getElementById('bElig').value;
  return D.filter(function(p){
    if(q&&(p.t+p.l+p.p+p.r+p.d+p.e+p.co).toLowerCase().indexOf(q)<0)return false;
    if(ft2&&p.t.toLowerCase().indexOf(ft2.toLowerCase())<0)return false;
    if(fs){var x=p.st.toLowerCase();if(fs==='available'&&x.indexOf('available')<0)return false;if(fs==='reserved'&&x.indexOf('reserved')<0)return false;if(fs==='construction'&&x.indexOf('construction')<0)return false;}
    if(fe&&p.el.toLowerCase().indexOf(fe.toLowerCase())<0)return false;
    return true;
  });
}

function gv(p,c){
  switch(c){
    case 1:return p.t;case 2:return p.l;case 3:return p.p;case 4:return p.pr||0;
    case 5:return parseFloat(p.s)||0;case 6:return parseInt(p.b)||0;case 7:return p.e;
    case 8:return p.y;case 9:return p.st;case 10:return p.el;case 11:return p.co;
  }return '';
}

function rn(){
  var data=gf();
  if(sc>=0)data.sort(function(a,b){var va=gv(a,sc),vb=gv(b,sc);if(typeof va==='number'&&typeof vb==='number')return sa?va-vb:vb-va;va=String(va).toLowerCase();vb=String(vb).toLowerCase();return sa?va.localeCompare(vb):vb.localeCompare(va);});
  var h='';
  for(var n=0;n<data.length;n++){
    var p=data[n],ic=ck[p.i];
    h+='<tr class="'+(ic?'chk':'')+'">';
    h+='<td><input type="checkbox" '+(ic?'checked':'')+' onchange="bTog('+p.i+')"></td>';
    h+='<td><a href="'+p.u+'" target="_blank" rel="noopener">View</a></td>';
    h+='<td>'+p.t+'</td>';
    h+='<td><strong><a href="https://www.google.com/maps/search/'+encodeURIComponent(p.l+', Luxembourg')+'" target="_blank" rel="noopener">'+p.l+'</a></strong></td>';
    h+='<td class="pr">'+fm(p.pr)+(p.pa?'<br><span class="pa">Aid: '+fm(p.pa)+'</span>':'')+'</td>';
    h+='<td>'+p.s+' m\u00B2</td>';
    h+='<td>'+p.b+'</td>';
    h+='<td>'+p.e+'</td>';
    h+='<td>'+p.y+(p.cp?'<br><small>Due: '+p.cp+'</small>':'')+'</td>';
    h+='<td><span class="'+sc2(p.st)+'">'+p.st+'</span></td>';
    h+='<td>'+p.el+'</td>';
    h+='<td>'+p.co+'</td>';
    h+='<td>'+ft(p)+'</td>';
    h+='<td><div class="ds">'+p.d+'</div></td>';
    h+='<td>'+p.p+'</td>';
    h+='</tr>';
  }
  document.getElementById('bBody').innerHTML=h;
  var av=data.filter(function(p){return p.st.toLowerCase().indexOf('available')>=0;}).length;
  var cn=0;for(var k in ck)if(ck[k])cn++;
  var mn=Infinity,mx=0;for(var j=0;j<data.length;j++){if(data[j].pr&&data[j].pr<mn)mn=data[j].pr;if(data[j].pr&&data[j].pr>mx)mx=data[j].pr;}
  document.getElementById('bStats').innerHTML='<div class="sc"><div class="sl">Shown</div><div class="sv">'+data.length+'</div></div><div class="sc"><div class="sl">Available</div><div class="sv">'+av+'</div></div><div class="sc"><div class="sl">Price range</div><div class="sv">'+fm(mn)+' - '+fm(mx)+'</div></div><div class="sc"><div class="sl">Checked</div><div class="sv">'+cn+'</div></div>';
}

window.bSort=function(c){
  for(var n=1;n<=11;n++){var el=document.getElementById('bH'+n);if(el){el.className='arr';}}
  if(sc===c){sa=!sa;}else{sc=c;sa=true;}
  var el2=document.getElementById('bH'+c);if(el2)el2.className='arr '+(sa?'asc':'dsc');
  rn();
};
window.bTog=function(id){ck[id]=!ck[id];rn();};
window.bClear=function(){
  document.getElementById('bSearch').value='';
  document.getElementById('bType').value='';
  document.getElementById('bStatus').value='';
  document.getElementById('bElig').value='';
  sc=-1;sa=true;
  for(var n=1;n<=11;n++){var el=document.getElementById('bH'+n);if(el)el.className='arr';}
  rn();
};

document.getElementById('bAll').addEventListener('change',function(){
  var data=gf();for(var n=0;n<data.length;n++)ck[data[n].i]=this.checked;rn();
});

// populate dropdowns
var ts={},es={};
for(var n=0;n<D.length;n++){ts[D[n].t]=1;es[D[n].el]=1;}
var tSel=document.getElementById('bType');for(var k in ts){var o=document.createElement('option');o.value=k;o.textContent=k;tSel.appendChild(o);}
var eSel=document.getElementById('bElig');for(var k in es){var o=document.createElement('option');o.value=k;o.textContent=k;eSel.appendChild(o);}

document.getElementById('bSearch').addEventListener('input',rn);
document.getElementById('bType').addEventListener('change',rn);
document.getElementById('bStatus').addEventListener('change',rn);
document.getElementById('bElig').addEventListener('change',rn);

// Sync top and bottom horizontal scrollbars
var sTop=document.getElementById('bScrollTop'),sBot=document.getElementById('bScrollBot'),sInner=document.getElementById('bScrollTopInner');
var syncing=false;
function syncWidth(){sInner.style.width=sBot.scrollWidth+'px';}
sTop.addEventListener('scroll',function(){if(syncing)return;syncing=true;sBot.scrollLeft=sTop.scrollLeft;syncing=false;});
sBot.addEventListener('scroll',function(){if(syncing)return;syncing=true;sTop.scrollLeft=sBot.scrollLeft;syncing=false;});
var origRn=rn;
rn=function(){origRn();syncWidth();};

rn();
})();
